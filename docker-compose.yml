services:
  db:
    image: pgvector/pgvector:pg16
    container_name: passpath-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-passpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passpath}
      POSTGRES_DB: ${POSTGRES_DB:-passpath}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-passpath} -d ${POSTGRES_DB:-passpath}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: passpath-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: passpath-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-passpath}:${POSTGRES_PASSWORD:-passpath}@db:5432/${POSTGRES_DB:-passpath}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"

volumes:
  db_data:
  redis_data:
