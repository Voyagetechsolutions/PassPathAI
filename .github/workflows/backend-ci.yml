name: Backend CI

on:
  push:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'apps/backend/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: passpath
          POSTGRES_PASSWORD: passpath
          POSTGRES_DB: passpath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U passpath"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://passpath:passpath@localhost:5432/passpath_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run prisma:deploy
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
